<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Redirecting…</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    // GitHub Pages serves 404.html for unknown SPA routes like /portfolio/interview.
    // Redirect back to the app entry while preserving the client-side path.
    (function () {
      var pathSegmentsToKeep = 1;
      var location = window.location;
      var basePath = location.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/');

      var redirectUrl =
        location.protocol +
        '//' +
        location.hostname +
        (location.port ? ':' + location.port : '') +
        basePath +
        '/?/' +
        location.pathname
          .slice(1)
          .split('/')
          .slice(pathSegmentsToKeep)
          .join('/')
          .replace(/&/g, '~and~') +
        (location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '') +
        location.hash;

      location.replace(redirectUrl);
    })();
  </script>
</head>
<body>
</body>
</html>
